<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ subject }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            line-height: 1.6;
            padding: 20px;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16162a 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .header {
            background: linear-gradient(135deg, {{ brand_color }} 0%, #6d28d9 100%);
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .content {
            padding: 40px 30px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
        }
        p {
            font-size: 16px;
            line-height: 1.8;
            color: #d1d5db;
            margin-bottom: 16px;
        }
        .button {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, {{ brand_color }} 0%, #6d28d9 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: {{ brand_color }};
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 13px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .quote-box {
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid {{ brand_color }};
            padding: 20px;
            margin: 30px 0;
            border-radius: 8px;
        }
        .quote-text {
            font-size: 18px;
            font-style: italic;
            color: #e5e7eb;
            line-height: 1.6;
        }
        .footer {
            background: #0f0f1a;
            padding: 30px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer-text {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .footer-links {
            margin-top: 16px;
        }
        .footer-link {
            color: {{ brand_color }};
            text-decoration: none;
            margin: 0 12px;
            font-size: 13px;
        }
        
        /* Mobile responsive */
        @media only screen and (max-width: 600px) {
            body {
                padding: 10px;
            }
            .header, .content, .footer {
                padding: 30px 20px;
            }
            h1 {
                font-size: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <div class="logo">{{ brand_name }}</div>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <div class="footer">
            <p class="footer-text">© {{ current_year }} {{ brand_name }}. All rights reserved.</p>
            <p class="footer-text">Personal Operating System for Elite Performers</p>
            <div class="footer-links">
                <a href="{{ app_url }}/settings" class="footer-link">Settings</a>
                <a href="{{ app_url }}/support" class="footer-link">Support</a>
                <a href="{{ app_url }}" class="footer-link">Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
