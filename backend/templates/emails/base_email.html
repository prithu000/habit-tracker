<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}YOU VS YOU{% endblock %}</title>
</head>
<body style="font-family: sans-serif; color: #000000; background-color: #ffffff; padding: 20px;">
    {% block content %}{% endblock %}

    <br>
    <hr style="border: 0; border-top: 1px solid #e0e0e0; margin: 20px 0;">
    <p style="font-size: 12px; color: #666666;">
        You are receiving this email because you created an account with {{ brand_name }}.<br>
        <a href="{{ settings_url }}">Manage Email Preferences</a> | 
        <a href="{{ privacy_url }}">Privacy Policy</a> | 
        <a href="{{ terms_url }}">Terms of Service</a>
    </p>
    <p style="font-size: 12px; color: #666666;">
        &copy; {{ current_year }} {{ brand_name }}. All rights reserved.
    </p>
</body>
</html>
