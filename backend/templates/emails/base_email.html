<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="x-apple-disable-message-reformatting">
    <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>{% block title %}YOU VS YOU{% endblock %}</title>
    
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    
    <style>
        /* Reset and Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #000000; color: #ffffff; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        table { border-collapse: collapse; border-spacing: 0; width: 100%; }
        img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
        a { text-decoration: none; }
        
        /* Premium Design System */
        .email-wrapper { width: 100%; background-color: #000000; padding: 40px 20px; }
        .email-container { max-width: 600px; margin: 0 auto; background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); }
        
        /* Logo */
        .logo-container { text-align: center; padding: 40px 20px 20px; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; background: linear-gradient(135deg, #ffffff 0%, #a78bfa 40%, #8b5cf6 60%, #ffffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-transform: uppercase; }
        .tagline { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #6b7280; margin-top: 8px; font-weight: 600; }
        
        /* Content */
        .content { padding: 20px; }
        
        /* Premium Card */
        .card { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 16px; padding: 32px; margin: 24px 0; backdrop-filter: blur(10px); }
        
        /* Typography */
        .heading-1 { font-size: 36px; font-weight: 900; line-height: 1.1; margin: 0 0 16px; color: #ffffff; letter-spacing: -0.03em; }
        .heading-2 { font-size: 24px; font-weight: 800; line-height: 1.2; margin: 0 0 12px; color: #ffffff; letter-spacing: -0.02em; }
        .heading-3 { font-size: 18px; font-weight: 700; line-height: 1.3; margin: 0 0 8px; color: #e5e7eb; }
        .body-text { font-size: 16px; line-height: 1.7; color: #d1d5db; margin: 0 0 16px; }
        .body-text-large { font-size: 18px; line-height: 1.6; color: #e5e7eb; margin: 0 0 16px; font-weight: 500; }
        .accent-text { color: #a78bfa; font-weight: 600; }
        .highlight-text { color: #ffffff; font-weight: 700; }
        
        /* Quote Block */
        .quote-block { background: rgba(139, 92, 246, 0.08); border-left: 4px solid #8b5cf6; padding: 24px; margin: 32px 0; border-radius: 8px; }
        .quote-text { font-size: 20px; line-height: 1.5; color: #e5e7eb; font-style: italic; font-weight: 500; margin: 0; }
        
        /* Stats Grid */
        .stats-grid { margin: 32px 0; }
        .stat-item { text-align: center; padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; margin: 8px 0; }
        .stat-value { font-size: 32px; font-weight: 900; color: #8b5cf6; line-height: 1; margin-bottom: 8px; }
        .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; font-weight: 600; }
        
        /* CTA Button */
        .cta-container { text-align: center; margin: 40px 0; }
        .cta-button { display: inline-block; padding: 18px 48px; background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: #ffffff !important; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4), 0 4px 16px rgba(139, 92, 246, 0.3); transition: all 0.3s ease; }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(139, 92, 246, 0.5); }
        .cta-secondary { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); color: #a78bfa !important; box-shadow: none; }
        
        /* Feature List */
        .feature-list { margin: 24px 0; }
        .feature-item { padding: 16px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .feature-item:last-child { border-bottom: none; }
        .feature-icon { display: inline-block; width: 24px; height: 24px; background: linear-gradient(135deg, #8b5cf6, #6366f1); border-radius: 6px; margin-right: 12px; text-align: center; line-height: 24px; font-size: 14px; vertical-align: middle; }
        .feature-text { display: inline-block; font-size: 16px; color: #e5e7eb; vertical-align: middle; }
        
        /* Divider */
        .divider { height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(139, 92, 246, 0.3) 50%, transparent 100%); margin: 40px 0; }
        
        /* Footer */
        .footer { padding: 40px 20px; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-tagline { font-size: 14px; color: #6b7280; margin: 0 0 16px; font-weight: 600; letter-spacing: 0.05em; }
        .footer-links { margin: 24px 0; }
        .footer-link { color: #9ca3af; text-decoration: none; margin: 0 12px; font-size: 14px; }
        .footer-link:hover { color: #a78bfa; }
        .footer-legal { font-size: 12px; color: #6b7280; margin: 24px 0 0; line-height: 1.6; }
        
        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-wrapper { padding: 20px 10px !important; }
            .logo { font-size: 24px !important; }
            .heading-1 { font-size: 28px !important; }
            .heading-2 { font-size: 20px !important; }
            .card { padding: 24px !important; }
            .cta-button { padding: 16px 36px !important; font-size: 15px !important; }
            .stat-value { font-size: 28px !important; }
            .quote-text { font-size: 18px !important; }
        }
        
        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            .email-wrapper { background-color: #000000 !important; }
            .email-container { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%) !important; }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <table class="email-container" role="presentation">
            <tr>
                <td>
                    <!-- Logo -->
                    <div class="logo-container">
                        <div class="logo">YOU VS YOU</div>
                        <div class="tagline">PERSONAL OPERATING SYSTEM</div>
                    </div>
                    
                    <!-- Content -->
                    <div class="content">
                        {% block content %}{% endblock %}
                    </div>
                    
                    <!-- Footer -->
                    <div class="footer">
                        <p class="footer-tagline">Engineer Your Best Self</p>
                        
                        <div class="footer-links">
                            <a href="{{ app_url }}" class="footer-link">Dashboard</a>
                            <a href="{{ app_url }}/analytics" class="footer-link">Analytics</a>
                            <a href="{{ app_url }}/settings" class="footer-link">Settings</a>
                            <a href="{{ app_url }}/help" class="footer-link">Help</a>
                        </div>
                        
                        <p class="footer-legal">
                            You're receiving this because you're part of YOU VS YOU.<br>
                            <a href="{{ unsubscribe_url }}" style="color: #8b5cf6; text-decoration: underline;">Manage Email Preferences</a>
                        </p>
                        
                        <p class="footer-legal" style="margin-top: 16px;">
                            © {{ current_year }} YOU VS YOU. All rights reserved.
                        </p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
